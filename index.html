---
layout: home
---

<div class="supertab-mode-switch card shadow-sm">
  <div class="card-body">
    <h2 class="h4 mb-3">Supertab checkout mode</h2>
    <p class="mb-2">Current selection: <strong data-supertab-mode-label>Test mode</strong></p>
    <p class="text-muted mb-3" data-supertab-mode-description>Sandbox mode using the existing test Supertab client and experience IDs.</p>

    <div class="d-flex flex-wrap gap-2">
      <button type="button" class="btn btn-outline-primary mr-2 mb-2" data-supertab-mode-toggle="test" aria-pressed="false">
        Use test mode
      </button>
      <button type="button" class="btn btn-outline-primary mb-2" data-supertab-mode-toggle="live" aria-pressed="false">
        Use live mode
      </button>
    </div>

    <p class="small text-muted mb-0">
      You can also choose a mode with <code>?supertabMode=test</code> or <code>?supertabMode=live</code>.
    </p>
  </div>
</div>
