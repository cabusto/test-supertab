<head>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <title>
    {% if page.title %}{{ page.title | escape }} - {{ site.title | escape }}
    {% else %}{{ site.title | escape }}{% endif %}
  </title>

  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">

  <!-- Supertab: base URL for paygate.js redirect -->
  <meta name="base-url" content="{{ '/' | relative_url }}">

  <link href='https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic' rel='stylesheet' type='text/css'>
  <link href='https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800' rel='stylesheet' type='text/css'>

  <script src="https://use.fontawesome.com/releases/v5.15.3/js/all.js" crossorigin="anonymous"></script>

  <link rel="stylesheet" href="{{"/assets/main.css" | relative_url }}">
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title | escape }}" href="{{ "/feed.xml" | relative_url }}">

  {% if page.layout == "post" %}
  <style>
    .content-blurred {
      filter: blur(6px);
      user-select: none;
      pointer-events: none;
    }

    .blur-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      pointer-events: none;
    }

    .blur-overlay span {
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      padding: 1rem 2rem;
      border-radius: 8px;
      font-size: 1.25rem;
      font-weight: bold;
    }
  </style>
  <link rel="preconnect" href="https://js.sbx.supertab.co" crossorigin>
  <link rel="dns-prefetch" href="https://js.sbx.supertab.co">
  <link rel="modulepreload" href="https://js.sbx.supertab.co/v3/supertab.js" crossorigin>
  <script type="module" src="{{ '/assets/js/paygate.js' | relative_url }}"></script>
  {% endif %}

</head>
