<!DOCTYPE html>

<html>

{% include head.html %}

<meta name="base-url" content="{{ '/' | relative_url }}">

{% if page.layout == "post" %}
<style>
  .content-blurred {
    filter: blur(6px);
    user-select: none;
    pointer-events: none;
  }

  .blur-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    pointer-events: none;
  }

  .blur-overlay span {
    background: rgba(0, 0, 0, 0.75);
    color: #fff;
    padding: 1rem 2rem;
    border-radius: 8px;
    font-size: 1.25rem;
    font-weight: bold;
  }
</style>
<link rel="preconnect" href="https://js.sbx.supertab.co" crossorigin>
<link rel="dns-prefetch" href="https://js.sbx.supertab.co">
<link rel="modulepreload" href="https://js.sbx.supertab.co/v3/supertab.js" crossorigin>
<script type="module" src="{{ '/assets/js/paygate.js' | relative_url }}"></script>
{% endif %}

<body>

  {% include navbar.html %}

  {% if page.layout == "post" %}
  <div id="blur-overlay" class="blur-overlay" role="status" aria-live="polite"><span>Purchase to read this article</span></div>
  {% endif %}

  {{ content }}

  {% include footer.html %}

  {% include scripts.html %}

  {% include google-analytics.html %}

</body>

</html>
